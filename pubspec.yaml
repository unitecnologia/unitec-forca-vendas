name: unitec_forca_vendas
description: Aplicativo de força de vendas do Unitec ERP (offline-first, sincroniza com o ERP local).
publish_to: "none"
version: 1.3.6+13

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  shared_preferences: ^2.3.2
  sqflite: ^2.4.1
  path: ^1.9.0
  provider: ^6.1.2
  connectivity_plus: ^6.1.0
  geolocator: ^13.0.2
  device_info_plus: ^10.1.0
  intl: ^0.19.0
  uuid: ^4.5.1
  pdf: ^3.11.1
  printing: ^5.13.4
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  # Fixado: versoes 1.5+ exigem toolchain Android muito novo (AGP 8.12+, Kotlin
  # 2.2, Java 17) que o projeto android/ gerado na CI nao garante.
  wakelock_plus: 1.2.8

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
