workflows:
  forca-vendas-android:
    name: Forca de Vendas - Android APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      # Fixado em 3.35.x: a stable atual gera AGP 9.0 (newDsl), que quebra o
      # build.gradle.kts. Esta versao gera AGP 8.9.1 + Gradle 8.12 + Kotlin 2.1.0
      # (conjunto testado pelo time do Flutter), onde o build compila sem erro.
      flutter: 3.35.0
      java: 17
      groups:
        # Grupo com as credenciais da keystore (cadastre no Codemagic):
        #   CM_KEYSTORE          -> conteudo da keystore em base64
        #   CM_KEYSTORE_PASSWORD -> senha do store
        #   CM_KEY_ALIAS         -> alias da chave
        #   CM_KEY_PASSWORD      -> senha da chave
        # Enquanto o grupo nao existir, o CI usa ci/unitecfv-release.p12 do repo.
        - keystore_credentials
    triggering:
      events:
        - push
    scripts:
      - name: Gerar projeto Android (android/ nao e versionado)
        script: |
          set -e
          flutter create --org com.unitec --project-name unitec_forca_vendas --platforms=android .
          # Rede de seguranca (inofensivo no AGP 8.x): se algum dia voltar ao AGP 9,
          # mantem o DSL legado/KGP externo que o nosso build.gradle.kts usa.
          grep -q '^android.newDsl=' android/gradle.properties || echo 'android.newDsl=false' >> android/gradle.properties
          grep -q '^android.builtInKotlin=' android/gradle.properties || echo 'android.builtInKotlin=false' >> android/gradle.properties
          # Diagnostico: registra no log qual AGP/Flutter foi usado de fato.
          echo "----- Flutter -----"; flutter --version || true
          echo "----- AGP gerado -----"; grep -i "com.android.application" android/settings.gradle.kts || true
      - name: Aplicar AndroidManifest (permissoes + HTTP cleartext + FileProvider)
        script: |
          set -e
          cp ci/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          mkdir -p android/app/src/main/res/xml
          cp ci/file_paths.xml android/app/src/main/res/xml/file_paths.xml
      - name: MainActivity (FragmentActivity + WhatsApp PDF direto)
        script: |
          set -e
          DEST=$(find android -name 'MainActivity.kt' | head -n 1)
          if [ -z "$DEST" ]; then
            echo "ERRO: MainActivity.kt nao gerado pelo flutter create"
            exit 1
          fi
          # Pacote do arquivo gerado (ex.: com.unitec.unitec_forca_vendas)
          PKG=$(dirname "$DEST" | sed -n 's|.*/kotlin/\(.*\)|\1|p' | tr '/' '.')
          cp ci/MainActivity.kt "$DEST"
          if [ -n "$PKG" ]; then
            sed -i '' "1s/^package .*/package $PKG/" "$DEST"
          fi
          echo "MainActivity instalado em $DEST (package $PKG)"
      - name: Configurar assinatura de release (chave estavel)
        script: |
          set -e
          # Atualizacao in-place no Android exige MESMA assinatura em todos os APKs.
          # Ordem: (1) grupo keystore_credentials no Codemagic; (2) ci/unitecfv-release.p12
          # versionado no repo. NUNCA gerar keystore aleatoria a cada build.
          STOREPASS="${CM_KEYSTORE_PASSWORD:-unitecfv2026}"
          ALIAS="${CM_KEY_ALIAS:-unitecfv}"
          KEYPASS="${CM_KEY_PASSWORD:-$STOREPASS}"
          STORE_TYPE=""
          if [ -n "$CM_KEYSTORE" ]; then
            echo "Assinatura: keystore do grupo Codemagic (estavel)."
            STORE_FILE="$CM_BUILD_DIR/release-from-group.keystore"
            echo "$CM_KEYSTORE" | base64 --decode > "$STORE_FILE"
          elif [ -f ci/unitecfv-release.p12 ]; then
            echo "Assinatura: ci/unitecfv-release.p12 do repositorio (estavel)."
            STORE_FILE="$CM_BUILD_DIR/unitecfv-release.p12"
            cp ci/unitecfv-release.p12 "$STORE_FILE"
            STORE_TYPE="pkcs12"
          else
            echo "ERRO: nenhuma keystore de release encontrada."
            echo "Adicione ci/unitecfv-release.p12 ao repo ou configure o grupo keystore_credentials."
            exit 1
          fi
          {
            printf 'storePassword=%s\n' "$STOREPASS"
            printf 'keyPassword=%s\n' "$KEYPASS"
            printf 'keyAlias=%s\n' "$ALIAS"
            printf 'storeFile=%s\n' "$STORE_FILE"
            [ -n "$STORE_TYPE" ] && printf 'storeType=%s\n' "$STORE_TYPE"
          } > android/key.properties
          cp ci/build.gradle.kts android/app/build.gradle.kts
          rm -f android/app/build.gradle
      - name: Instalar dependencias
        script: flutter pub get
      - name: Build APK release (versionCode incremental)
        script: |
          set -e
          # versionCode precisa ser MAIOR que o APK ja instalado (nao e assinatura).
          PUBSPEC_CODE=$(grep '^version:' pubspec.yaml | sed 's/.*+//')
          BUILD_NUM=${BUILD_NUMBER:-1}
          if [ "$BUILD_NUM" -lt "$PUBSPEC_CODE" ]; then
            BUILD_NUM=$PUBSPEC_CODE
          fi
          echo "versionCode=$BUILD_NUM (pubspec+$PUBSPEC_CODE, build #$BUILD_NUMBER)"
          flutter build apk --release --build-number=$BUILD_NUM
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - TROQUE_PELO_SEU_EMAIL@exemplo.com
        notify:
          success: true
          failure: true
