workflows:
  forca-vendas-android:
    name: Forca de Vendas - Android APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      # Fixado em 3.35.x: a stable atual gera AGP 9.0 (newDsl), que quebra o
      # build.gradle.kts. Esta versao gera AGP 8.9.1 + Gradle 8.12 + Kotlin 2.1.0
      # (conjunto testado pelo time do Flutter), onde o build compila sem erro.
      flutter: 3.35.0
      java: 17
      groups:
        # Grupo com as credenciais da keystore (cadastre no Codemagic):
        #   CM_KEYSTORE          -> conteudo da keystore em base64
        #   CM_KEYSTORE_PASSWORD -> senha do store
        #   CM_KEY_ALIAS         -> alias da chave
        #   CM_KEY_PASSWORD      -> senha da chave
        # Enquanto o grupo nao existir/estiver vazio, o build usa a chave debug.
        - keystore_credentials
    triggering:
      events:
        - push
    scripts:
      - name: Gerar projeto Android (android/ nao e versionado)
        script: |
          set -e
          flutter create --org com.unitec --project-name unitec_forca_vendas --platforms=android .
          # Rede de seguranca (inofensivo no AGP 8.x): se algum dia voltar ao AGP 9,
          # mantem o DSL legado/KGP externo que o nosso build.gradle.kts usa.
          grep -q '^android.newDsl=' android/gradle.properties || echo 'android.newDsl=false' >> android/gradle.properties
          grep -q '^android.builtInKotlin=' android/gradle.properties || echo 'android.builtInKotlin=false' >> android/gradle.properties
          # Diagnostico: registra no log qual AGP/Flutter foi usado de fato.
          echo "----- Flutter -----"; flutter --version || true
          echo "----- AGP gerado -----"; grep -i "com.android.application" android/settings.gradle.kts || true
      - name: Aplicar AndroidManifest (permissoes + HTTP cleartext)
        script: |
          set -e
          cp ci/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
      - name: Configurar assinatura de release (chave estavel)
        script: |
          set -e
          # O APK SEMPRE e assinado em release. Quando o grupo keystore_credentials
          # esta preenchido, usamos a chave fixa (atualizacoes funcionam sem
          # desinstalar). Quando esta vazio, geramos uma keystore de bootstrap e
          # imprimimos os valores para voce colar no grupo UMA UNICA VEZ.
          if [ -z "$CM_KEYSTORE" ]; then
            echo "=================================================================="
            echo " ATENCAO: grupo keystore_credentials VAZIO."
            echo " Gerando keystore de bootstrap (assinatura RELEASE)."
            echo " Para as ATUALIZACOES funcionarem sem desinstalar, copie os"
            echo " valores abaixo para o grupo keystore_credentials (uma vez)."
            echo "=================================================================="
            STOREPASS="unitecfv2026"
            ALIAS="unitecfv"
            keytool -genkeypair -v \
              -keystore "$CM_BUILD_DIR/release.keystore" \
              -storepass "$STOREPASS" -keypass "$STOREPASS" -alias "$ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Unitec Forca de Vendas, OU=Mobile, O=Unitec, C=BR"
            echo "----- COPIE PARA O GRUPO keystore_credentials -----"
            echo "CM_KEYSTORE_PASSWORD=$STOREPASS"
            echo "CM_KEY_ALIAS=$ALIAS"
            echo "CM_KEY_PASSWORD=$STOREPASS"
            echo "CM_KEYSTORE (base64, linha unica):"
            base64 "$CM_BUILD_DIR/release.keystore" | tr -d '\n'; echo
            echo "---------------------------------------------------"
            export CM_KEYSTORE_PASSWORD="$STOREPASS"
            export CM_KEY_ALIAS="$ALIAS"
            export CM_KEY_PASSWORD="$STOREPASS"
          else
            echo "Keystore do grupo encontrada: assinatura estavel (release)."
            echo "$CM_KEYSTORE" | base64 --decode > "$CM_BUILD_DIR/release.keystore"
          fi
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=%s\n' \
            "$CM_KEYSTORE_PASSWORD" "$CM_KEY_PASSWORD" "$CM_KEY_ALIAS" "$CM_BUILD_DIR/release.keystore" \
            > android/key.properties
          cp ci/build.gradle.kts android/app/build.gradle.kts
          rm -f android/app/build.gradle
      - name: Instalar dependencias
        script: flutter pub get
      - name: Build APK release (versionCode incremental)
        script: |
          set -e
          # build-number incremental evita o conflito de "versao ja instalada".
          flutter build apk --release --build-number=${BUILD_NUMBER:-1}
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - TROQUE_PELO_SEU_EMAIL@exemplo.com
        notify:
          success: true
          failure: true
